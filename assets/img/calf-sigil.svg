<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="sigil-title" fill="none">
  <title id="sigil-title">The Calf — sigil of Astral Spaceways</title>
  <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer ring -->
    <circle cx="50" cy="50" r="45" stroke-width="1"/>
    <!-- the eight angels: eight dots around the ring -->
    <g fill="currentColor" stroke="none">
      <circle cx="50" cy="4"  r="2.1"/>
      <circle cx="82.5" cy="17.5" r="2.1"/>
      <circle cx="96" cy="50" r="2.1"/>
      <circle cx="82.5" cy="82.5" r="2.1"/>
      <circle cx="50" cy="96" r="2.1"/>
      <circle cx="17.5" cy="82.5" r="2.1"/>
      <circle cx="4"  cy="50" r="2.1"/>
      <circle cx="17.5" cy="17.5" r="2.1"/>
    </g>
    <!-- the calf: horns -->
    <path d="M28 40 C 22 30, 26 22, 33 24 C 30 30, 34 36, 40 39"/>
    <path d="M72 40 C 78 30, 74 22, 67 24 C 70 30, 66 36, 60 39"/>
    <!-- ears -->
    <path d="M33 44 C 26 44, 22 48, 24 53"/>
    <path d="M67 44 C 74 44, 78 48, 76 53"/>
    <!-- head / muzzle -->
    <path d="M35 42 C 34 58, 40 72, 50 74 C 60 72, 66 58, 65 42"/>
    <path d="M42 66 C 46 70, 54 70, 58 66"/>
    <!-- eyes -->
    <circle cx="43" cy="52" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="57" cy="52" r="1.6" fill="currentColor" stroke="none"/>
    <!-- nostrils -->
    <path d="M46 62 q 1.5 2 3 0" stroke-width="1.2"/>
    <path d="M51 62 q 1.5 2 3 0" stroke-width="1.2"/>
  </g>
</svg>
